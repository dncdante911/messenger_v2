# ──────────────────────────────────────────────────────────────────────────────
# Nginx конфиг для WorldMates после удаления PHP/WoWonder
#
# Архитектура:
#   Интернет → Nginx (80/443) → статика (upload/, themes/, cache/)
#   Node.js слушает на порту 449 со своим SSL — без изменений
#
# Что убрано по сравнению со старым конфигом:
#   - proxy_pass на Apache (8288) — Apache больше не нужен
#   - PHP-FPM блоки
#   - DirectoryIndex index.php
#
# Установка (aaPanel):
#   1. Вставить этот файл в aaPanel → Websites → worldmates.club → Config
#   2. Остановить и удалить сайт из Apache (aaPanel → Apache → worldmates.club)
#   3. nginx -t && systemctl reload nginx
# ──────────────────────────────────────────────────────────────────────────────

# HTTP → HTTPS редирект
server {
    listen 80;
    server_name worldmates.club cdn.worldmates.club music.worldmates.club;
    return 301 https://$host$request_uri;
}

# HTTPS — основной блок
server {
    listen 443 ssl;
    listen 443 quic;
    http2 on;

    server_name worldmates.club cdn.worldmates.club music.worldmates.club;

    root /www/wwwroot/worldmates.club/;

    # ── SSL ───────────────────────────────────────────────────────────────────
    ssl_certificate     /www/server/panel/vhost/cert/worldmates.club/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/worldmates.club/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets on;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Alt-Svc 'h3=":443"; h3-29=":443"';
    error_page 497 https://$host$request_uri;

    # ── Запрещённые файлы ─────────────────────────────────────────────────────
    location ~ ^/(\.user\.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README\.md) {
        return 404;
    }

    # ── Let's Encrypt / SSL верификация ──────────────────────────────────────
    location ~ /\.well-known {
        allow all;
        root /www/wwwroot/worldmates.club/;
        try_files $uri =404;
    }

    # ── Статические медиафайлы пользователей ──────────────────────────────────
    # Отдаётся напрямую Nginx без проксирования — быстро и без нагрузки
    location ^~ /upload/ {
        expires 30d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options nosniff;
        try_files $uri =404;

        # Запрет запуска скриптов из upload/
        location ~* \.(php|py|pl|sh|cgi)$ {
            return 403;
        }
    }

    # ── Темы (шаблоны для Node.js) ────────────────────────────────────────────
    location ^~ /themes/ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── Кэш ──────────────────────────────────────────────────────────────────
    location ^~ /cache/ {
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── Всё остальное — 404 ───────────────────────────────────────────────────
    # PHP-панели больше нет, index.php не существует.
    # Если нужна landing-страница — положи index.html в корень сайта.
    location / {
        try_files $uri $uri/ =404;
    }

    # ── Логи ─────────────────────────────────────────────────────────────────
    access_log /www/wwwlogs/worldmates.club.log;
    error_log  /www/wwwlogs/worldmates.club.error.log;
}
