name: Build iOS IPA

on:
  push:
    branches:
      - claude/port-messenger-ios-HGsXM
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Ruby 3.2
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install CocoaPods
        run: gem install cocoapods --no-document

      - name: Install JS dependencies
        working-directory: ios-messenger
        run: npm install --legacy-peer-deps

      - name: Expo prebuild
        working-directory: ios-messenger
        run: npx expo prebuild --platform ios --clean --no-install

      - name: CocoaPods install
        working-directory: ios-messenger/ios
        run: pod install

      - name: Detect workspace and scheme
        id: xcode
        working-directory: ios-messenger/ios
        run: |
          WS=$(find . -maxdepth 1 -name "*.xcworkspace" | head -1 | xargs basename)
          SC="${WS%.xcworkspace}"
          echo "workspace=$WS" >> $GITHUB_OUTPUT
          echo "scheme=$SC"    >> $GITHUB_OUTPUT
          echo "Workspace: $WS  |  Scheme: $SC"

      # xcodebuild BUILD (не archive) — создаёт .app без подписи
      # Archive требует сертификат; build работает без него.
      # Sideloadly сам подпишет .app при установке.
      - name: Build .app (unsigned, iphoneos)
        working-directory: ios-messenger/ios
        run: |
          set -eo pipefail
          xcodebuild \
            -workspace "${{ steps.xcode.outputs.workspace }}" \
            -scheme    "${{ steps.xcode.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath /tmp/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build \
            2>&1 | tee /tmp/xcodebuild.log
          echo "=== Build directory ==="
          find /tmp/DerivedData/Build/Products -maxdepth 3 -name "*.app" -type d 2>/dev/null || true

      - name: Package unsigned IPA
        run: |
          set -eo pipefail
          APP=$(find /tmp/DerivedData/Build/Products -name "*.app" -type d | grep -v simulator | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: .app not found. Full DerivedData contents:"
            find /tmp/DerivedData/Build -maxdepth 5 2>/dev/null || true
            exit 1
          fi
          echo "App: $APP"
          rm -rf /tmp/ipa_payload
          mkdir -p /tmp/ipa_payload/Payload
          cp -r "$APP" /tmp/ipa_payload/Payload/
          cd /tmp/ipa_payload
          zip -qr /tmp/WorldMatesMessenger.ipa Payload
          echo "IPA: $(du -sh /tmp/WorldMatesMessenger.ipa | cut -f1)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorldMates-Messenger-IPA
          path: /tmp/WorldMatesMessenger.ipa
          retention-days: 14

      - name: Show errors on failure
        if: failure()
        run: grep -E "error:|BUILD FAILED" /tmp/xcodebuild.log 2>/dev/null | tail -50 || true
